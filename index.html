<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spani Atacadista · Gestão RH</title>
  <meta name="theme-color" content="#f6f7fb" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="manifest" href="manifest.json?v=28" />
  <link rel="stylesheet" href="style.css?v=28" />
</head>
<body>
  <section id="loginScreen" class="login-screen login-fachada">
    <div class="login-fachada-overlay"></div>

    <div class="login-fachada-shell">
      <section class="login-fachada-brand">
        <img src="assets/spani-logo-oficial.png" alt="Spani Atacadista" class="login-logo-oficial" />
        <h1>Gestão RH</h1>
        <p>Acesso interno para líderes e administradores.</p>
      </section>

      <form id="loginForm" class="login-card login-card-dark" autocomplete="off" novalidate>
        <div class="login-card-title">
          <h2>Acesse sua conta</h2>
          <span>Sistema interno</span>
        </div>

        <label>Usuário</label>
        <div class="field">
          <span>👤</span>
          <input id="usuario" name="usuario_v28" type="text" placeholder="Digite seu usuário" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" required />
        </div>

        <label>Senha</label>
        <div class="field">
          <span>🔒</span>
          <input id="senha" name="senha_v28" type="password" placeholder="Digite sua senha" maxlength="4" inputmode="numeric" autocomplete="off" required />
          <button id="togglePassword" type="button" aria-label="Mostrar ou ocultar senha">👁️</button>
        </div>

        <div class="login-row">
          <label class="remember">
            <input id="rememberMe" type="checkbox" checked />
            <span>Lembrar meu acesso</span>
          </label>
          <button id="forgotPasswordBtn" type="button" class="link-btn">Esqueceu sua senha?</button>
        </div>

        <button class="primary-btn" type="submit">Entrar</button>
        <p id="loginMsg" class="message"></p>
      </form>
    </div>
  </section>

  <main id="appScreen" class="app hidden">
    <aside class="sidebar">
      <div class="brand">
        <img src="assets/logo.svg" alt="Spani Atacadista" />
        <div>
          <strong>Spani Atacadista</strong>
          <span>Gestão RH</span>
        </div>
      </div>
      <nav id="sideNav"></nav>

      <div class="sidebar-user">
        <div class="avatar-small" id="sideInitials">RH</div>
        <div>
          <strong id="sideUserName">Usuário</strong>
          <span id="sideUserRole">Perfil</span>
        </div>
        <button id="sideEditBtn" type="button" title="Perfil">✎</button>
      </div>
      <button id="logoutBtn" class="logout">↪</button>
    </aside>

    <section class="main">
      <header class="topbar">
        <div class="top-left">
          <button id="menuBtn" class="menu-btn">☰</button>
          <button id="pageIconBtn" class="collapse-btn page-icon-inicio" type="button" aria-label="Início" title="Início">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="4" y="4" width="7" height="7" rx="2"></rect>
              <rect x="13" y="4" width="7" height="7" rx="2"></rect>
              <rect x="4" y="13" width="7" height="7" rx="2"></rect>
              <rect x="13" y="13" width="7" height="7" rx="2"></rect>
            </svg>
          </button>
          <div>
            <h1 id="pageTitle">Início</h1>
            <p id="pageSubtitle">Resumo do sistema</p>
          </div>
        </div>

        <div class="top-actions">
          <div class="search-box">🔍 <input id="searchInput" type="search" placeholder="Pesquisar..." /></div>
          <button id="refreshBtn" class="icon-top" title="Atualizar">↻</button>
          <button class="icon-top" type="button" title="Notificações">🔔<small>0</small></button>
          <button id="themeToggleBtn" class="icon-top theme-toggle-v25" type="button" title="Alternar tema" aria-label="Alternar tema">🌙</button>
          <div class="user-pill">
            <span id="userInitials">RH</span>
            <div>
              <strong id="userName">Usuário</strong>
              <small id="userRole">Perfil</small>
            </div>
            <b>⌄</b>
          </div>
        </div>
      </header>

      <section id="content" class="content"></section>
    </section>
  </main>

  <section id="modal" class="modal hidden">
    <div class="modal-card">
      <button id="closeModal" class="modal-close" type="button">×</button>
      <h2 id="modalTitle"></h2>
      <div id="modalBody"></div>
    </div>
  </section>

  <div id="toast" class="toast hidden"></div>
  <script type="module" src="script.js?v=28"></script>

  <script>
    (function(){
      function applySpaniTheme(mode){
        mode = mode === "light" ? "light" : "dark";
        try { localStorage.setItem("spaniTheme", mode); } catch(e) {}

        document.documentElement.setAttribute("data-theme", mode);
        document.documentElement.classList.toggle("sp-theme-light", mode === "light");
        document.documentElement.classList.toggle("sp-theme-dark", mode === "dark");

        if(document.body){
          document.body.setAttribute("data-theme", mode);
          document.body.classList.toggle("light-theme", mode === "light");
          document.body.classList.toggle("dark-theme", mode === "dark");
          document.body.classList.toggle("sp-theme-light", mode === "light");
          document.body.classList.toggle("sp-theme-dark", mode === "dark");
        }

        var btn = document.getElementById("themeToggleBtn");
        if(btn){
          btn.textContent = mode === "light" ? "☀️" : "🌙";
          btn.classList.toggle("active-light", mode === "light");
          btn.classList.toggle("active-dark", mode === "dark");
          btn.title = mode === "light" ? "Tema claro ativo — clique para escuro" : "Tema escuro ativo — clique para claro";
        }
      }

      function toggleSpaniTheme(event){
        if(event){
          event.preventDefault();
          event.stopPropagation();
          if(event.stopImmediatePropagation) event.stopImmediatePropagation();
        }
        var current = document.documentElement.getAttribute("data-theme") || "dark";
        applySpaniTheme(current === "light" ? "dark" : "light");
      }

      function init(){
        var saved = "dark";
        try { saved = localStorage.getItem("spaniTheme") || "dark"; } catch(e) {}
        applySpaniTheme(saved);

        var btn = document.getElementById("themeToggleBtn");
        if(btn){
          btn.onclick = toggleSpaniTheme;
          btn.addEventListener("click", toggleSpaniTheme, true);
        }
      }

      window.SpaniThemeToggle = toggleSpaniTheme;
      window.SpaniThemeApply = applySpaniTheme;

      if(document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
      } else {
        init();
      }
    })();
  </script>

</body>
</html>
