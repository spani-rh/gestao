<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spani Atacadista · Gestão RH</title>
  <meta name="theme-color" content="#07111f" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="manifest" href="manifest.json?v=8" />
  <link rel="stylesheet" href="style.css?v=8" />
</head>
<body>
  <section id="loginScreen" class="login-screen">
    <div class="login-bg"></div>
    <div class="login-shell">
      <div class="login-brand">
        <img src="assets/logo.svg" alt="Spani Atacadista" />
        <h1>Gestão RH</h1>
        <p>Sistema interno para escalas, banco de horas, férias, planos de ação e avisos ao RH.</p>
        <div class="mini-metrics">
          <div><strong>4</strong><span>Administradores</span></div>
          <div><strong>7</strong><span>Líderes</span></div>
        </div>
      </div>

      <form id="loginForm" class="login-card" autocomplete="off" novalidate>
        <h2>Acesse sua conta</h2>
        <p>Informe usuário e senha para continuar.</p>

        <label for="usuario">Usuário</label>
        <div class="field">
          <span>👤</span>
          <input id="usuario" name="usuario_v8" type="text" placeholder="Digite seu usuário" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" required />
        </div>

        <label for="senha">Senha</label>
        <div class="field">
          <span>🔒</span>
          <input id="senha" name="senha_v8" type="password" placeholder="Digite sua senha" maxlength="4" inputmode="numeric" autocomplete="off" required />
          <button id="togglePassword" type="button" class="icon-btn" aria-label="Mostrar ou ocultar senha">👁️</button>
        </div>

        <div class="login-row">
          <label class="remember"><input id="rememberMe" type="checkbox" checked /> Lembrar meu usuário</label>
          <button id="forgotPasswordBtn" type="button" class="link-button">Esqueceu sua senha?</button>
        </div>

        <button class="primary-button" type="submit">Entrar</button>
        <p id="loginMsg" class="form-message"></p>
      </form>
    </div>
  </section>

  <main id="appScreen" class="app hidden">
    <aside class="sidebar">
      <div class="logo-block">
        <img src="assets/logo.svg" alt="Spani Atacadista" />
        <span>Gestão RH</span>
      </div>
      <nav id="sideNav"></nav>
      <button id="logoutBtn" class="logout-button">Sair</button>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <div>
          <h1 id="pageTitle">Início</h1>
          <p id="pageSubtitle">Resumo do sistema</p>
        </div>
        <div class="top-actions">
          <button id="refreshBtn" class="ghost-button">Atualizar</button>
          <button id="quickAvisoBtn" class="primary-small">Avisar RH</button>
          <div class="user-pill">
            <span id="userInitials">RH</span>
            <div>
              <strong id="userName">Usuário</strong>
              <small id="userRole">Perfil</small>
            </div>
          </div>
        </div>
      </header>

      <section id="content" class="content"></section>
    </section>
  </main>

  <section id="modal" class="modal hidden">
    <div class="modal-card">
      <button id="closeModal" class="modal-close" type="button">×</button>
      <h2 id="modalTitle"></h2>
      <div id="modalBody"></div>
    </div>
  </section>

  <div id="toast" class="toast hidden"></div>

  <script type="module" src="script.js?v=8"></script>
</body>
</html>
