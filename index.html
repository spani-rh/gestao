<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spani Atacadista · Gestão RH</title>
  <meta name="theme-color" content="#101827" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="manifest" href="manifest.json?v=12" />
  <link rel="stylesheet" href="style.css?v=12" />
</head>
<body>
  <section id="loginScreen" class="login-screen">
    <div class="login-card">
      <img src="assets/logo.svg" alt="Spani Atacadista" class="login-logo" />
      <h1>Gestão RH</h1>
      <p>Acesso interno para líderes e administradores.</p>

      <form id="loginForm" autocomplete="off" novalidate>
        <label>Usuário</label>
        <div class="field"><span>👤</span><input id="usuario" name="usuario_v12" type="text" placeholder="Digite seu usuário" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" required /></div>

        <label>Senha</label>
        <div class="field"><span>🔒</span><input id="senha" name="senha_v12" type="password" placeholder="Digite sua senha" maxlength="4" inputmode="numeric" autocomplete="off" required /><button id="togglePassword" type="button">👁️</button></div>

        <div class="login-row">
          <label class="remember"><input id="rememberMe" type="checkbox" checked /> Lembrar usuário</label>
          <button id="forgotPasswordBtn" type="button" class="link-btn">Esqueceu?</button>
        </div>

        <button class="primary-btn" type="submit">Entrar</button>
        <p id="loginMsg" class="message"></p>
      </form>
    </div>
  </section>

  <main id="appScreen" class="app hidden">
    <aside class="sidebar">
      <div class="brand">
        <img src="assets/logo.svg" alt="Spani Atacadista" />
        <strong>Gestão RH</strong>
      </div>
      <nav id="sideNav"></nav>
      <button id="logoutBtn" class="logout">Sair</button>
    </aside>

    <section class="main">
      <header class="topbar">
        <button id="menuBtn" class="menu-btn">☰</button>
        <div>
          <h1 id="pageTitle">Início</h1>
          <p id="pageSubtitle">Resumo do sistema</p>
        </div>
        <div class="top-actions">
          <button id="refreshBtn" class="outline-btn">Atualizar</button>
          <button id="quickAvisoBtn" class="primary-small">Avisar RH</button>
          <div class="user-box">
            <span id="userInitials">RH</span>
            <div><strong id="userName">Usuário</strong><small id="userRole">Perfil</small></div>
          </div>
        </div>
      </header>

      <section id="content" class="content"></section>
    </section>
  </main>

  <section id="modal" class="modal hidden">
    <div class="modal-card">
      <button id="closeModal" class="modal-close" type="button">×</button>
      <h2 id="modalTitle"></h2>
      <div id="modalBody"></div>
    </div>
  </section>

  <div id="toast" class="toast hidden"></div>
  <script type="module" src="script.js?v=12"></script>
</body>
</html>
