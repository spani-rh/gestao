<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spani Atacadista · Gestão RH</title>
  <meta name="theme-color" content="#07111f" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="manifest" href="manifest.json?v=11" />
  <link rel="stylesheet" href="style.css?v=11" />
</head>
<body>
  <section id="loginScreen" class="login-screen">
    <div class="login-canvas">
      <form id="loginForm" class="login-form" autocomplete="off" novalidate>
        <div class="input-shell user-input-shell">
          <span class="input-icon">👤</span>
          <input id="usuario" name="usuario_v10" type="text" placeholder="Digite seu usuário" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" required />
        </div>

        <div class="input-shell pass-input-shell">
          <span class="input-icon">🔒</span>
          <input id="senha" name="senha_v10" type="password" placeholder="Digite sua senha" maxlength="4" inputmode="numeric" autocomplete="off" required />
          <button id="togglePassword" type="button" class="eye-btn" aria-label="Mostrar ou ocultar senha">👁️</button>
        </div>

        <label class="remember-hotspot"><input id="rememberMe" type="checkbox" checked /> <span></span></label>
        <button id="forgotPasswordBtn" type="button" class="forgot-hotspot" aria-label="Esqueceu sua senha?"></button>
        <button class="enter-hotspot" type="submit" aria-label="Entrar"></button>
        <p id="loginMsg" class="login-msg"></p>
      </form>
    </div>
  </section>

  <main id="appScreen" class="app hidden">
    <aside class="sidebar">
      <div class="logo-block">
        <img src="assets/logo-spani-real.png" alt="Spani Atacadista" />
        <span>Gestão RH</span>
      </div>
      <nav id="sideNav"></nav>
      <button id="logoutBtn" class="logout-button">Sair</button>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <div>
          <h1 id="pageTitle">Início</h1>
          <p id="pageSubtitle">Resumo do sistema</p>
        </div>
        <div class="top-actions">
          <button id="refreshBtn" class="ghost-button">Atualizar</button>
          <button id="quickAvisoBtn" class="primary-small">Avisar RH</button>
          <div class="user-pill">
            <span id="userInitials">RH</span>
            <div>
              <strong id="userName">Usuário</strong>
              <small id="userRole">Perfil</small>
            </div>
          </div>
        </div>
      </header>

      <section id="content" class="content"></section>
    </section>
  </main>

  <section id="modal" class="modal hidden">
    <div class="modal-card">
      <button id="closeModal" class="modal-close" type="button">×</button>
      <h2 id="modalTitle"></h2>
      <div id="modalBody"></div>
    </div>
  </section>

  <div id="toast" class="toast hidden"></div>

  <script type="module" src="script.js?v=11"></script>
</body>
</html>
